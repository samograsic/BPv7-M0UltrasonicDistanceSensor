; PlatformIO Project Configuration File
; BPv7 M0 Ultrasonic Distance Sensor
; Target: Adafruit Feather M0 with RFM95 LoRa (SAMD21 / Cortex-M0+)

[env:adafruit_feather_m0]
platform  = atmelsam
board     = adafruit_feather_m0
framework = arduino

upload_port  = COM17
monitor_port = COM17
monitor_speed = 115200

lib_deps =
    arduino-libraries/RTCZero@^1.6.0
    adafruit/Adafruit SleepyDog Library@^1.6.5
    adafruit/Adafruit GPS Library@^1.7.4

; Library dependencies are in lib/ (copied from BPv7-BaseStation, M0-adapted)
lib_extra_dirs = lib

lib_ldf_mode = chain+

build_flags =
    -I src
    -DDEBUG_ENABLED=1
    -DDEBUG_NO_SLEEP=1
